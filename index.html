<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny table</title>
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utils/responsive.css">
</head>

<body>
    <main class="app-container">
        <section aria-label="Search and pagination">
            <div class="filter-controls">
                <search class="posts-search">
                    <input type="search" id="filterInput" placeholder="Search..." autocomplete="off">
                </search>
                <div class="pagination">
                    <button id="prevPageBtn" aria-label="Previous page">Prev</button>
                    <span id="pageInfo" aria-live="polite">Page 1</span>
                    <button id="nextPageBtn" aria-label="Next page">Next</button>
                </div>
            </div>
        </section>

        <section aria-label="Data table">
            <div class="table-wrapper">
                <table class="posts-table" id="postsTable" aria-label="Posts with sortable columns">
                    <thead>
                        <tr>
                            <th scope="col" id="sortId" aria-sort="ascending" tabindex="0" aria-label="Sort by ID">Id</th>
                            <th scope="col" id="sortTitle" aria-sort="none" tabindex="0" aria-label="Sort by title">Title</th>
                            <th scope="col">Body</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script defer src="js/utils.js"></script>
    <script defer src="js/script.js"></script>
</body>

</html>
